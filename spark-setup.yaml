### Lifted it off from: https://github.com/bitnami/containers/blob/main/bitnami/spark/docker-compose.yml

services:
  spark:
    # image: apache/spark:3.5.0
    ### Replaced the image with build for our custom Image 
    build:
      context: .
      dockerfile: ./Dockerfile

    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./lake-client:/opt/spark/work-dir/lake-client
      - ./spark-jobs:/opt/spark/work-dir/spark-jobs


  spark-worker:
    build:
      context: .
      dockerfile: ./Dockerfile

    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077
    depends_on:
      - spark
    ports:
      - "8081:8081"
    volumes:
      - ./lake-client:/opt/spark/work-dir/lake-client
      - ./spark-jobs:/opt/spark/work-dir/spark-jobs

# if you want more workers, run with the scale command:
# docker compose up --scale spark-worker=2